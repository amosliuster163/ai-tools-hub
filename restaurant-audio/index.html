<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐厅翻译测试音频播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #e67e22;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
        }
        .player-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .audio-icon {
            font-size: 40px;
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-size: 18px;
            color: #fff;
        }
        .track-category {
            color: #888;
            font-size: 14px;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-prev {
            background: #3498db;
            color: white;
        }
        .btn-next {
            background: #e67e22;
            color: white;
        }
        .btn-play {
            background: #27ae60;
            color: white;
            min-width: 100px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .playlist {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .playlist-title {
            margin-bottom: 15px;
            color: #e67e22;
        }
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .track-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        .track-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .track-item.active {
            background: #e67e22;
            color: white;
        }
        .stats {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 餐厅翻译测试音频播放器</h1>
        <p class="subtitle">中英泰三语餐厅点餐场景 · 57个音频片段</p>
        
        <div class="player-section">
            <div class="now-playing">
                <div class="audio-icon">🔊</div>
                <div class="track-info">
                    <div class="track-name" id="currentTrack">点击下方列表选择音频</div>
                    <div class="track-category" id="currentCategory">餐厅翻译测试</div>
                </div>
            </div>
            <audio id="audioPlayer" controls></audio>
            <div class="controls">
                <button class="btn btn-prev" onclick="playPrev()">⏮️ 上一首</button>
                <button class="btn btn-play" onclick="togglePlay()">▶️ 播放</button>
                <button class="btn btn-next" onclick="playNext()">⏭️ 下一首</button>
            </div>
        </div>
        
        <div class="playlist">
            <h3 class="playlist-title">📋 音频列表</h3>
            <div class="playlist-grid" id="playlistGrid"></div>
        </div>
        
        <div class="stats">
            共 57 个音频文件 · 餐厅点餐完整场景测试
        </div>
    </div>

    <script>
        // 实际音频文件列表（按文件名排序）
        const audioFiles = [
            '001_闲聊提问1.mp3',
            '003_闲聊提问2.mp3',
            '005_闲聊提问3.mp3',
            '008_闲聊提问4.mp3',
            '010_闲聊提问5.mp3',
            '012_闲聊提问6.mp3',
            '014_闲聊提问7.mp3',
            '016_闲聊提问8.mp3',
            '018_闲聊提问9.mp3',
            '024_中文用户确认.mp3',
            '025_中文用户加菜.mp3',
            '026_中文用户结账.mp3',
            '028_中文用户付款.mp3',
            '029_中文用户感谢.mp3',
            '030_中文用户点餐.mp3',
            '031_中文用户点餐1.mp3',
            '032_中文用户点餐3.mp3',
            '033_中文用户点餐4.mp3',
            '034_中文用户确认春卷.mp3',
            '035_中文用户询问辣度.mp3',
            '036_中文用户问辣度.mp3',
            '037_服务员回应1.mp3',
            '038_服务员回应3.mp3',
            '039_服务员回应入场.mp3',
            '040_服务员回应支付.mp3',
            '041_服务员回应春卷.mp3',
            '042_服务员回应点餐.mp3',
            '中文用户追问.mp3',
            '服务员回应结账.mp3',
            '服务员回应英文结账.mp3',
            '服务员回应辣度.mp3',
            '服务员回应过敏.mp3',
            '服务员感谢.mp3',
            '服务员找零.mp3',
            '服务员推荐1.mp3',
            '服务员推荐2.mp3',
            '服务员确认4.mp3',
            '服务员确认5.mp3',
            '服务员确认加菜.mp3',
            '服务员确认加餐.mp3',
            '服务员确认英文点餐.mp3',
            '服务员确认饮品.mp3',
            '用户加餐.mp3',
            '英文客户付款.mp3',
            '英文客户入场.mp3',
            '英文客户感谢.mp3',
            '英文客户点餐.mp3',
            '英文客户点餐1.mp3',
            '英文客户点饮品.mp3',
            '英文客户结账.mp3',
            '英文客户询问推荐.mp3',
            '英文客户问过敏.mp3',
            '进入餐厅模式命令.mp3',
            '退出餐厅模式命令.mp3',
            '退出餐厅模式命令.mp3'
        ];

        const basePath = 'audio/';
        let currentIndex = 0;
        const player = document.getElementById('audioPlayer');
        const currentTrackEl = document.getElementById('currentTrack');
        const playlistGrid = document.getElementById('playlistGrid');

        // 初始化播放列表
        function initPlaylist() {
            playlistGrid.innerHTML = '';
            audioFiles.forEach((file, index) => {
                const displayName = file.replace('.mp3', '').replace(/^\d+_/, '');
                const item = document.createElement('div');
                item.className = 'track-item';
                item.textContent = displayName;
                item.onclick = () => playTrack(index);
                item.dataset.index = index;
                playlistGrid.appendChild(item);
            });
        }

        // 播放指定曲目
        function playTrack(index) {
            currentIndex = index;
            const file = audioFiles[index];
            player.src = basePath + file;
            currentTrackEl.textContent = file.replace('.mp3', '').replace(/^\d+_/, '');
            
            // 更新选中状态
            document.querySelectorAll('.track-item').forEach(el => {
                el.classList.remove('active');
                if (parseInt(el.dataset.index) === index) {
                    el.classList.add('active');
                }
            });
            
            player.play();
        }

        // 播放上一首
        function playPrev() {
            currentIndex = (currentIndex - 1 + audioFiles.length) % audioFiles.length;
            playTrack(currentIndex);
        }

        // 播放下一首
        function playNext() {
            currentIndex = (currentIndex + 1) % audioFiles.length;
            playTrack(currentIndex);
        }

        // 播放/暂停
        function togglePlay() {
            if (player.src) {
                if (player.paused) {
                    player.play();
                } else {
                    player.pause();
                }
            } else if (audioFiles.length > 0) {
                playTrack(0);
            }
        }

        // 自动播放下一首
        player.addEventListener('ended', playNext);

        // 初始化
        initPlaylist();
    </script>
</body>
</html>
