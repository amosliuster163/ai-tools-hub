<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐厅翻译助手 - 测试音频播放器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }

        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00a8cc; }
        .btn-warning { background: #ff9800; color: #000; }
        .btn-warning:hover { background: #e68900; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-secondary:hover { background: #444; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        
        .settings { background: #252540; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .settings-title { color: #00d4ff; margin-bottom: 15px; font-weight: bold; }
        .settings-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .settings label { color: #aaa; }
        .settings input[type="number"] { width: 60px; padding: 8px; border: 1px solid #444; border-radius: 5px; background: #1a1a2e; color: #fff; }

        .now-playing { background: linear-gradient(135deg, #252540, #1a1a2e); padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #00d4ff; }
        .now-playing .segment-id { font-size: 14px; color: #00d4ff; margin-bottom: 5px; }
        .now-playing .segment-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .now-playing .speaker { color: #888; margin-bottom: 15px; }
        .now-playing .mode-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .mode-normal { background: #4ecdc430; color: #4ecdc4; }
        .mode-restaurant { background: #ff6b6b30; color: #ff6b6b; }
        .mode-command { background: #ffd93d30; color: #ffd93d; }
        .now-playing .text { font-size: 18px; line-height: 1.6; margin-bottom: 10px; }
        .now-playing .text-zh { color: #fff; }
        .now-playing .text-en { color: #aaa; font-size: 14px; }
        .now-playing .text-th { color: #888; font-size: 14px; }
        .now-playing .timer { color: #00d4ff; font-size: 14px; margin-top: 10px; }
        .now-playing .total-time { color: #ff6b6b; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .now-playing-controls { margin-top: 15px; }
        .btn-sm { padding: 8px 16px; font-size: 14px; margin: 0 5px; }

        .playlist { background: #252540; border-radius: 15px; overflow: hidden; }
        .playlist-header { padding: 15px 20px; background: #1a1a2e; font-weight: bold; }
        .playlist-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.3s; }
        .playlist-item:hover { background: #2a2a4a; }
        .playlist-item.active { background: #00d4ff20; border-left: 3px solid #00d4ff; }
        .playlist-item.playing { background: #00d4ff30; }
        .playlist-item .id { width: 40px; color: #00d4ff; font-weight: bold; }
        .playlist-item .info { flex: 1; }
        .playlist-item .name { font-weight: 500; }
        .playlist-item .speaker { font-size: 12px; color: #888; }
        .playlist-item .lang { padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .lang-zh { background: #ff6b6b30; color: #ff6b6b; }
        .lang-en { background: #4ecdc430; color: #4ecdc4; }
        .lang-th { background: #ffd93d30; color: #ffd93d; }
        .playlist-item .pause { color: #888; font-size: 12px; margin-left: 10px; min-width: 50px; }

        .progress { height: 4px; background: #333; margin-top: 20px; border-radius: 2px; }
        .progress-bar { height: 100%; background: #00d4ff; border-radius: 2px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>餐厅翻译助手测试</h1>
        <p class="subtitle">自动播放测试音频，模拟真实对话场景</p>

        
        <div class="controls">
            <button class="btn btn-secondary" id="prevBtn" onclick="playPrev()" disabled>⏮ 上一个</button>
            <button class="btn btn-primary" id="playBtn" onclick="startAutoPlay()">▶ 播放</button>
            <button class="btn btn-secondary" id="nextBtn" onclick="playNext()" disabled>下一个 ⏭</button>
        </div>
        <div class="controls">
            <button class="btn btn-warning" id="pauseBtn" onclick="togglePause()" disabled>⏸ 暂停</button>
            <button class="btn btn-secondary" id="resumeBtn" onclick="resumeFromStart()" disabled style="display:none">↺ 重播当前</button>
            <button class="btn btn-secondary" id="stopBtn" onclick="stopPlay()" disabled>⏹ 停止</button>
        </div>

        <div class="settings">
            <div class="settings-title">停顿时间设置（秒）</div>
            <div class="settings-row">
                <label>普通模式（用户提问后等待AI回复）:</label>
                <input type="number" id="pauseNormal" value="6" min="1" max="30"> 秒
            </div>
            <div class="settings-row">
                <label>餐厅模式（翻译对话）:</label>
                <input type="number" id="pauseRestaurant" value="3" min="1" max="30"> 秒
            </div>
            <div class="settings-row">
                <label>命令模式（进入/退出命令）:</label>
                <input type="number" id="pauseCommand" value="2" min="1" max="30"> 秒
            </div>
        </div>

        <div class="now-playing" id="nowPlaying" style="display: none;">
            <div class="segment-id" id="currentId"></div>
            <div class="segment-name" id="currentName"></div>
            <div class="speaker" id="currentSpeaker"></div>
            <div class="text text-zh" id="currentTextZh"></div>
            <div class="text text-en" id="currentTextEn"></div>
            <div class="text text-th" id="currentTextTh"></div>
            <div class="timer" id="timer"></div>
            <div class="total-time" id="totalTimer">总时间: 00:00:00</div>
            <div class="now-playing-controls" id="nowPlayingControls" style="margin-top: 15px; display: none;">
                <button class="btn btn-warning btn-sm" onclick="togglePause()" id="pauseBtn2">⏸ 暂停</button>
                <button class="btn btn-secondary btn-sm" onclick="resumeFromStart()" id="resumeBtn2" style="display:none">↺ 重播</button>
                <button class="btn btn-secondary btn-sm" onclick="playPrev()" id="prevBtn2">⏮ 上一个</button>
                <button class="btn btn-secondary btn-sm" onclick="playNext()" id="nextBtn2">下一个 ⏭</button>
            </div>
        </div>

        <div class="playlist">
            <div class="playlist-header">播放列表 (共 50 段)</div>
            <div id="playlistContainer"></div>
            <div class="progress"><div class="progress-bar" id="progressBar" style="width: 0%"></div></div>
        </div>
    </div>

        let currentIndex = -1;
        let isPlaying = false;
        let isPaused = false;
        let audio = null;
        let timerInterval = null;
        let pausedCallback = null;
        let remainingTime = 0;

        // 总计时器相关变量
        let totalStartTime = null;
        let totalPausedTime = 0;
        let totalTimerInterval = null;

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startTotalTimer() {
            totalStartTime = Date.now();
            totalPausedTime = 0;
            totalTimerInterval = setInterval(updateTotalTimer, 1000);
        }

        function updateTotalTimer() {
            if (isPaused) return;
            const elapsed = Math.floor((Date.now() - totalStartTime - totalPausedTime) / 1000);
            document.getElementById('totalTimer').textContent = '总时间: ' + formatTime(elapsed);
        }

        function pauseTotalTimer() {
            if (totalTimerInterval) {
                totalPausedTime = Date.now() - totalStartTime - totalPausedTime;
            }
        }

        function resumeTotalTimer() {
            if (totalStartTime) {
                totalStartTime = Date.now() - totalPausedTime;
            }
        }

        function stopTotalTimer() {
            if (totalTimerInterval) {
                clearInterval(totalTimerInterval);
                totalTimerInterval = null;
            }
        }

        function getPauseTime(mode) {
            const pauseNormal = parseInt(document.getElementById('pauseNormal').value) || 6;
            const pauseRestaurant = parseInt(document.getElementById('pauseRestaurant').value) || 3;
            const pauseCommand = parseInt(document.getElementById('pauseCommand').value) || 2;

            switch(mode) {
                case 'normal':
                    return pauseNormal;
                case 'restaurant':
                    return pauseRestaurant;
                case 'command':
                    return pauseCommand;
                default:
                    return 3;
            }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            container.innerHTML = playlist.map((item, index) => `
                <div class="playlist-item" id="item-${index}" onclick="playSegment(${index})">
                    <div class="id">${item.id}</div>
                    <div class="info">
                        <div class="name">${item.name}</div>
                        <div class="speaker">${item.speaker}</div>
                    </div>
                    <span class="lang lang-${item.language}">${item.language.toUpperCase()}</span>
                    <span class="pause">${getPauseTime(item.mode)}s</span>
                </div>
            `).join('');
        }

        function updateNowPlaying(item) {
            const panel = document.getElementById('nowPlaying');
            if (!item) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            document.getElementById('currentId').textContent = `Segment ${item.id}/${playlist.length}`;
            document.getElementById('currentName').innerHTML = item.name + `<span class="mode-badge mode-${item.mode}">${item.mode === 'normal' ? '普通' : item.mode === 'restaurant' ? '餐厅' : '命令'}</span>`;
            document.getElementById('currentSpeaker').textContent = `${item.speaker} (${item.language.toUpperCase()})`;
            document.getElementById('currentTextZh').textContent = item.text_zh;
            document.getElementById('currentTextEn').textContent = item.text_en;
            document.getElementById('currentTextTh').textContent = item.text_th;
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / playlist.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function updatePlaylistUI() {
            document.querySelectorAll('.playlist-item').forEach((el, i) => {
                el.classList.remove('active', 'playing');
                if (i === currentIndex) {
                    el.classList.add('playing');
                } else if (i < currentIndex) {
                    el.classList.add('active');
                }
            });
        }

        function startTimer(seconds, callback) {
            remainingTime = seconds;
            pausedCallback = callback;
            const timerEl = document.getElementById('timer');

            timerInterval = setInterval(() => {
                if (isPaused) return;
                timerEl.textContent = `等待 ${remainingTime} 秒...（可点击暂停）`;
                remainingTime--;
                if (remainingTime < 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = '';
                    pausedCallback = null;
                    callback();
                }
            }, 1000);
        }

        function playSegment(index, fromStart = false) {
            if (index < 0) index = 0;
            if (index >= playlist.length) {
                stopPlay();
                alert('测试完成！');
                return;
            }

            // 清理之前的音频和定时器
            if (audio) {
                audio.pause();
                audio = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
            }

            isPaused = false;
            currentIndex = index;
            const item = playlist[index];

            updateNowPlaying(item);
            updatePlaylistUI();
            updateProgress();

            audio = new Audio('audio/' + encodeURIComponent(item.audio_file));
            audio.play();

            // 更新顶部控制按钮
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
            document.getElementById('resumeBtn').style.display = 'none';
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = false;

            // 更新播放框内的控制按钮
            document.getElementById('nowPlayingControls').style.display = 'block';
            document.getElementById('pauseBtn2').textContent = '⏸ 暂停';
            document.getElementById('pauseBtn2').disabled = false;
            document.getElementById('resumeBtn2').style.display = 'none';
            document.getElementById('prevBtn2').disabled = index === 0;
            document.getElementById('nextBtn2').disabled = false;

            audio.onended = () => {
                const pauseTime = getPauseTime(item.mode);
                startTimer(pauseTime, () => {
                    playSegment(index + 1);
                });
            };
        }

        function playPrev() {
            if (currentIndex > 0) {
                playSegment(currentIndex - 1);
            }
        }

        function playNext() {
            playSegment(currentIndex + 1);
        }

        function startAutoPlay() {
            isPlaying = true;
            isPaused = false;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            startTotalTimer();
            playSegment(0);
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pauseBtn');
            const pauseBtn2 = document.getElementById('pauseBtn2');
            const resumeBtn = document.getElementById('resumeBtn');
            const resumeBtn2 = document.getElementById('resumeBtn2');
            const timerEl = document.getElementById('timer');

            if (isPaused) {
                pauseBtn.textContent = '▶ 继续播放';
                pauseBtn2.textContent = '▶ 继续';
                resumeBtn.style.display = 'inline-block';
                resumeBtn2.style.display = 'inline-block';
                timerEl.textContent = `已暂停，剩余 ${remainingTime} 秒`;
                if (audio) audio.pause();
            } else {
                pauseBtn.textContent = '⏸ 暂停';
                pauseBtn2.textContent = '⏸ 暂停';
                resumeBtn.style.display = 'none';
                resumeBtn2.style.display = 'none';
                if (audio && audio.paused) audio.play();
            }
        }

        function resumeFromStart() {
            // 从头播放当前段
            playSegment(currentIndex, true);
        }

        function stopPlay() {
            isPlaying = false;
            isPaused = false;
            if (audio) {
                audio.pause();
                audio = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            stopTotalTimer();
            document.getElementById('playBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
            document.getElementById('resumeBtn').style.display = 'none';
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('timer').textContent = '';
            document.getElementById('nowPlayingControls').style.display = 'none';
        }

        function resetProgress() {
            stopPlay();
            currentIndex = -1;
            updateProgress();
            updatePlaylistUI();
            document.getElementById('nowPlaying').style.display = 'none';
            document.getElementById('totalTimer').textContent = '总时间: 00:00:00';
        }

        // 初始化
        renderPlaylist();
    </script>
</body>
</html>
