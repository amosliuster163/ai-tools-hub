<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问问AI - AI工具集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F5F1E8;
            --bg-card: #FFFFFF;
            --color-primary: #1E3A5F;
            --color-accent: #C9A227;
            --color-text: #2C3E50;
            --color-muted: #6B7B8C;
            --shadow-soft: 0 4px 20px rgba(30, 58, 95, 0.08);
            --radius: 12px;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Source Serif 4', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-main); color: var(--color-text); line-height: 1.7; }
        header { background: var(--color-primary); padding: 30px 40px; }
        .header-back { max-width: 900px; margin: 0 auto; }
        .back-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--color-accent); }
        .hero { background: linear-gradient(135deg, #E74C3C 0%, #C0392B 100%); color: #fff; padding: 80px 40px; }
        .hero-content { max-width: 900px; margin: 0 auto; }
        .hero-badge { display: inline-block; font-size: 0.85rem; font-weight: 600; padding: 6px 16px; background: var(--color-accent); color: #fff; border-radius: 6px; margin-bottom: 24px; }
        .hero-title { font-family: var(--font-display); font-size: 3.5rem; font-weight: 900; margin-bottom: 20px; }
        .hero-desc { font-size: 1.2rem; opacity: 0.9; line-height: 1.6; max-width: 600px; }
        main { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
        .section { margin-bottom: 50px; }
        .section-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--color-primary); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid rgba(201,162,39,0.3); }
        .section-content { font-size: 1rem; line-height: 1.8; }
        .features-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 24px; }
        .feature-item { background: #fff; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-soft); }
        .feature-icon { font-size: 1.5rem; margin-bottom: 10px; }
        .feature-title { font-weight: 600; color: var(--color-primary); margin-bottom: 6px; }
        .feature-desc { font-size: 0.9rem; color: var(--color-muted); }
        .official-link { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: var(--color-primary); color: #fff; text-decoration: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; margin-top: 30px; transition: all 0.3s; }
        .official-link:hover { background: #2D4A6F; transform: translateY(-2px); }
        footer { background: var(--color-primary); color: rgba(255,255,255,0.7); padding: 30px 40px; text-align: center; }
        @media (max-width: 768px) {
            .hero-title { font-size: 2.2rem; }
            .hero { padding: 50px 20px; }
            main { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-back">
            <a href="index.html" class="back-link">← 返回老刘聊AI</a>
        </div>
    </header>
    
    <section class="hero">
        <div class="hero-content">
            <span class="hero-badge">大模型 · 对话AI</span>
            <h1 class="hero-title">问问AI</h1>
            <p class="hero-desc">国产AI助手，支持对话、写作、翻译、代码生成，专为中文用户优化，简单易用。</p>
        </div>
    </section>
    
    <main>
        <section class="section">
            <h2 class="section-title">功能特点</h2>
            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <div class="feature-title">智能对话</div>
                    <div class="feature-desc">自然语言交互，理解上下文，流畅对话</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">✍️</div>
                    <div class="feature-title">写作助手</div>
                    <div class="feature-desc">文章写作、文案创作、邮件撰写</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌐</div>
                    <div class="feature-title">翻译功能</div>
                    <div class="feature-desc">多语言翻译，中英互译准确流畅</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💻</div>
                    <div class="feature-title">代码生成</div>
                    <div class="feature-desc">代码编写、调试帮助、解释说明</div>
                </div>
            </div>
        </section>
        
        <section class="section">
            <h2 class="section-title">适用场景</h2>
            <p class="section-content">
                日常问答、学习辅导、文案写作、翻译工作、编程学习等场景，适合中文用户日常使用。
            </p>
        </section>
        
        <section class="section">
            <h2 class="section-title">官方网站</h2>
            <p class="section-content">访问官网开始使用问问AI。</p>
            <a href="https://wenwen.ai" target="_blank" class="official-link">
                <span>访问问问AI官网</span>
                <span>→</span>
            </a>
        </section>
    </main>
    
    <footer>
        <p>老刘聊AI · 2026</p>
        <p style="margin-top:8px;font-size:0.8rem;">
            <a href="https://github.com/amosliuster163" style="color:rgba(255,255,255,0.7);">GitHub: amosliuster163</a>
        </p>
    </footer>
</body>
</html>
